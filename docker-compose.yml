name: starterkit-next

services:
  frontend:
    build:
      context: .
      target: development
    container_name: starterkit-frontend
    command: pnpm run dev -- --hostname 0.0.0.0
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: development
      NEXT_TELEMETRY_DISABLED: '1'
      WATCHPACK_POLLING: 'true'
      CHOKIDAR_USEPOLLING: 'true'
      APP_URL: ${APP_URL:-http://localhost:3000}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3000/api}
      DATABASE_URL: ${DATABASE_URL:-postgresql://starterkit:starterkit@database:5432/starterkit?schema=public}
    volumes:
      - .:/app
      - frontend_node_modules:/app/node_modules
      - frontend_next:/app/.next
    depends_on:
      database:
        condition: service_healthy
    restart: unless-stopped

  database:
    image: postgres:16-alpine
    container_name: starterkit-postgres
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-starterkit}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-starterkit}
      POSTGRES_DB: ${POSTGRES_DB:-starterkit}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"']
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

volumes:
  frontend_node_modules:
  frontend_next:
  postgres_data:
